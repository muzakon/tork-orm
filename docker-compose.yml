# Local databases for the ORM's live integration tests.
#
#   docker compose up -d
#   cargo test -p tork-orm --features postgres --test postgres_live
#   cargo test -p tork-orm --features mysql    --test mysql_live
#
# Host ports are non-default (55432, 3307) to avoid clashing with any local
# servers. Tests default to the URLs below; override with TEST_DATABASE_URL /
# TEST_MYSQL_URL.
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: tork
      POSTGRES_PASSWORD: tork
      POSTGRES_DB: tork_test
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tork -d tork_test"]
      interval: 2s
      timeout: 3s
      retries: 15
    tmpfs:
      - /var/lib/postgresql/data

  mysql:
    image: mysql:8.0
    # Use the classic auth plugin so the test user authenticates over a plaintext
    # (NoTls) connection without an RSA/SSL handshake.
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: tork
      MYSQL_PASSWORD: tork
      MYSQL_DATABASE: tork_test
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "tork", "-ptork"]
      interval: 3s
      timeout: 5s
      retries: 20
    tmpfs:
      - /var/lib/mysql
