# Local PostgreSQL for the ORM's live integration tests.
#
#   docker compose up -d
#   cargo test -p tork-orm --features postgres --test postgres_live
#
# The host port is 55432 (not the default 5432) to avoid clashing with any other
# local PostgreSQL. Tests default to the URL below; override with TEST_DATABASE_URL.
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: tork
      POSTGRES_PASSWORD: tork
      POSTGRES_DB: tork_test
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tork -d tork_test"]
      interval: 2s
      timeout: 3s
      retries: 15
    tmpfs:
      - /var/lib/postgresql/data
